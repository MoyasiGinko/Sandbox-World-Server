<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Sandbox API Portal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-start: #f4fbff;
            --bg-end: #fff6ec;
            --ink: #112233;
            --muted: #4a6275;
            --card: #ffffffcc;
            --border: #d5e3ee;
            --brand: #007f8a;
            --brand-strong: #005f66;
            --warn: #ad5700;
            --ok: #0f7a44;
            --danger: #9f1e2a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
        }
        .shell {
            width: min(1200px, 94vw);
            margin: 0 auto;
            padding: 20px 0 36px;
        }
        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            padding: 14px;
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(8px);
            border-radius: 18px;
        }
        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .brand small {
            display: block;
            color: var(--muted);
            font-weight: 500;
            font-size: 0.8rem;
            margin-top: 2px;
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav a {
            text-decoration: none;
            color: var(--brand-strong);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.88rem;
            font-weight: 600;
            background: #fff;
        }
        .nav a:hover {
            border-color: var(--brand);
            color: var(--brand);
        }
        .hero {
            margin: 10px 0 20px;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(1.6rem, 2.2vw, 2.1rem);
            line-height: 1.15;
        }
        .hero p {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 76ch;
        }
        .grid {
            display: grid;
            gap: 14px;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            background: #fff;
            box-shadow: 0 8px 24px #d6e2ec55;
        }
        .card h2, .card h3 {
            margin: 0 0 8px;
            font-size: 1.05rem;
        }
        .mono {
            font-family: "IBM Plex Mono", Consolas, monospace;
            font-size: 0.88rem;
        }
        .endpoint {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 7px 0;
            padding: 8px;
            border-radius: 10px;
            background: #f8fcff;
        }
        .method {
            font-family: "IBM Plex Mono", Consolas, monospace;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 6px;
            padding: 3px 7px;
            border: 1px solid var(--border);
            min-width: 52px;
            text-align: center;
        }
        .m-get { color: #095f96; }
        .m-post { color: #0f7a44; }
        .m-put, .m-patch { color: var(--warn); }
        .m-delete { color: var(--danger); }
        .stack {
            display: grid;
            gap: 8px;
        }
        label {
            font-size: 0.86rem;
            color: var(--muted);
            display: block;
            margin-bottom: 3px;
        }
        input, textarea, select, button {
            width: 100%;
            font: inherit;
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 10px;
            background: #fff;
        }
        textarea {
            min-height: 92px;
            resize: vertical;
            font-family: "IBM Plex Mono", Consolas, monospace;
            font-size: 0.82rem;
        }
        button {
            cursor: pointer;
            font-weight: 700;
            background: linear-gradient(120deg, #e4f8f8, #fff3e0);
            border-color: #c4dde0;
        }
        button:hover { border-color: var(--brand); }
        .result {
            margin-top: 6px;
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 10px;
            background: #fbfdff;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: "IBM Plex Mono", Consolas, monospace;
            font-size: 0.82rem;
            min-height: 44px;
        }
        .split {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        .hint {
            font-size: 0.84rem;
            color: var(--muted);
            margin: 0;
        }
        @media (max-width: 720px) {
            .topbar { border-radius: 14px; }
            .card { border-radius: 14px; }
        }
    </style>
    <script>
        async function callApi(opts) {
            const {
                method,
                path,
                body,
                token,
                target,
                query,
            } = opts;
            const targetEl = document.getElementById(target);
            const headers = { "Content-Type": "application/json" };
            if (token) {
                headers["Authorization"] = `Bearer ${token}`;
            }
            const url = query ? `${path}${path.includes("?") ? "&" : "?"}${query}` : path;
            targetEl.textContent = "Loading...";
            try {
                const res = await fetch(url, {
                    method,
                    headers,
                    body: body ? JSON.stringify(body) : undefined,
                });
                const raw = await res.text();
                let pretty = raw;
                try {
                    pretty = JSON.stringify(JSON.parse(raw), null, 2);
                } catch (_err) {
                }
                targetEl.textContent = `Status: ${res.status}\n\n${pretty}`;
            } catch (err) {
                targetEl.textContent = `Request failed: ${err}`;
            }
        }
    </script>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                Sandbox API Portal
                <small>Unified control room for local API exploration</small>
            </div>
            <nav class="nav">
                <a href="/">Dashboard</a>
                <a href="/portal/api/auth/">Auth</a>
                <a href="/portal/api/users/">Users</a>
                <a href="/portal/api/worlds/">Worlds</a>
                <a href="/portal/api/servers/">Servers</a>
                <a href="/portal/api/config/">Config</a>
                <a href="/admin/">Admin</a>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
